version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aurelia_postgres
    environment:
      POSTGRES_USER: aurelia
      POSTGRES_PASSWORD: aurelia
      POSTGRES_DB: aurelia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aurelia_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aurelia" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aurelia_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aurelia_network
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aurelia_api
    ports:
      - "8000:8000"
    environment:
      - API_ENV=development
      - DATABASE_URL=postgresql://aurelia:aurelia@postgres:5432/aurelia_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    networks:
      - aurelia_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile.dev
    container_name: aurelia_dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - ./apps/dashboard:/app
      - /app/node_modules
      - /app/.next
    networks:
      - aurelia_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  aurelia_network:
    driver: bridge
